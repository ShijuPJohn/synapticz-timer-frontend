name: CI/CD - Synapticz Timer

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCLOUD_AUTH }}'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCLOUD_PROJECT }}
          install_components: 'beta'

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCLOUD_ARTIFACT_REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            . \
            -t ${{ secrets.GCLOUD_ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCLOUD_PROJECT }}/${{ secrets.GCLOUD_REPO }}/${{ secrets.GCLOUD_APP_NAME }}:${{ github.sha }} \
            -t ${{ secrets.GCLOUD_ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCLOUD_PROJECT }}/${{ secrets.GCLOUD_REPO }}/${{ secrets.GCLOUD_APP_NAME }}:latest

      - name: Push to Artifact Registry
        run: |
          docker push --all-tags ${{ secrets.GCLOUD_ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCLOUD_PROJECT }}/${{ secrets.GCLOUD_REPO }}/${{ secrets.GCLOUD_APP_NAME }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.GCLOUD_APP_NAME }} \
            --image ${{ secrets.GCLOUD_ARTIFACT_REGION }}-docker.pkg.dev/${{ secrets.GCLOUD_PROJECT }}/${{ secrets.GCLOUD_REPO }}/${{ secrets.GCLOUD_APP_NAME }}:${{ github.sha }} \
            --region ${{ secrets.GCLOUD_REGION || 'asia-southeast1' }} \
            --platform managed \
            --project ${{ secrets.GCLOUD_PROJECT }} \
            --service-account ${{ secrets.GCLOUD_EMAIL }} \
            --allow-unauthenticated \
            --quiet
